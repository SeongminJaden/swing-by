name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ai_agent
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─── Job 1: Rust CLI binaries ────────────────────────────────────────────────
jobs:
  build-cli:
    name: CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ai_agent-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: ai_agent-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: ai_agent-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ai_agent-macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ai_agent-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "${{ matrix.artifact }}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

# ─── Job 2: Electron Desktop IDE ─────────────────────────────────────────────
  build-ide:
    name: IDE — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            electron_args: --linux
            artifacts: "editor/release/*.AppImage"

          - os: macos-latest
            rust_target: aarch64-apple-darwin
            electron_args: --mac --arm64
            artifacts: "editor/release/*.dmg"

          - os: macos-13
            rust_target: x86_64-apple-darwin
            electron_args: --mac --x64
            artifacts: "editor/release/*.dmg"

          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            electron_args: --win
            artifacts: "editor/release/*.exe"

    steps:
      - uses: actions/checkout@v4

      # ── Rust: build ai_agent binary ──────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Copy binary to target/release (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.rust_target }}/release/ai_agent target/release/ai_agent 2>/dev/null || true

      - name: Copy binary to target/release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.rust_target }}/release/ai_agent.exe" "target/release/ai_agent.exe" -Force

      # ── Node.js + Electron build ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editor/package-lock.json

      - name: Install dependencies
        working-directory: editor
        run: npm ci

      - name: Build renderer + main
        working-directory: editor
        run: npm run build:all

      - name: Package Electron app (Linux)
        if: runner.os == 'Linux'
        working-directory: editor
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Electron app (macOS)
        if: runner.os == 'macOS'
        working-directory: editor
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package Electron app (Windows)
        if: runner.os == 'Windows'
        working-directory: editor
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IDE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ide-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn

# ─── Job 3: Create GitHub Release ────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-cli, build-ide]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "ai_agent-*" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) \
            -exec sha256sum {} \; | sed 's|./[^/]*/||' | sort > ../checksums.txt
          cat ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Swing-by ${{ github.ref_name }}
          body: |
            ## Swing-by ${{ github.ref_name }}

            Local LLM multi-agent system + desktop IDE powered by Ollama.

            ---

            ### Quick Install (CLI only)

            **Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install_mac.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            ---

            ### Desktop IDE

            Download the GUI desktop app for your platform:

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `swing-by-ide-*-x64.AppImage` |
            | macOS Apple Silicon | `swing-by-ide-*-arm64.dmg` |
            | macOS Intel | `swing-by-ide-*-x64.dmg` |
            | Windows x86_64 | `swing-by-ide-*-setup.exe` |

            The IDE bundles the `ai_agent` binary — no separate CLI install needed.

            ---

            ### CLI Downloads

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `ai_agent-linux-x86_64` |
            | Linux ARM64 | `ai_agent-linux-arm64` |
            | macOS Intel | `ai_agent-macos-x86_64` |
            | macOS Apple Silicon | `ai_agent-macos-arm64` |
            | Windows x86_64 | `ai_agent-windows-x86_64.exe` |

          files: |
            artifacts/**/*
            checksums.txt
          draft: false
          prerelease: false
